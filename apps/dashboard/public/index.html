<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ClaudeClaw — Mission Control</title>
<style>
  /* ---------- Design tokens (match V3 screenshots) ---------- */
  :root {
    --bg: #0a0b10;
    --panel: #11131a;
    --panel-2: #161922;
    --border: #1d2030;
    --border-2: #262a3c;
    --text: #e6e9f0;
    --muted: #8b93a7;
    --muted-2: #5b6378;
    --accent: #8b7cff;
    --accent-2: #b388ff;
    --ok: #3ddc97;
    --warn: #f5b041;
    --err: #ff6b6b;
    --blue: #4aa3ff;
    --pink: #ff7ac0;
    --green: #6ee7b7;
    --orange: #fb923c;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  a { color: var(--accent-2); text-decoration: none; }
  button { font: inherit; }

  /* ---------- App shell ---------- */
  .app { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }
  .sidebar {
    background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow-y: auto;
  }
  .ws-switcher {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
  }
  .ws-switcher .ws-icon { width: 22px; height: 22px; border-radius: 5px; background: var(--blue); }
  .ws-switcher .ws-name { font-weight: 600; flex: 1; }
  .ws-switcher .ws-chev { color: var(--muted); }
  .search-box {
    margin: 10px 12px; padding: 7px 10px; border-radius: 7px;
    background: var(--panel-2); display: flex; align-items: center; gap: 8px;
    color: var(--muted); font-size: 13px; cursor: text;
  }
  .search-box .kbd { margin-left: auto; font-size: 11px; color: var(--muted-2); }
  .nav-section { margin: 8px 0 4px; }
  .nav-section .label {
    color: var(--muted); font-size: 11px; padding: 6px 16px 4px;
    text-transform: uppercase; letter-spacing: .04em;
    display: flex; align-items: center; gap: 6px; cursor: pointer;
  }
  .nav-section .label .chev { font-size: 9px; }
  .nav-link {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 16px; color: var(--muted); cursor: pointer;
    border-left: 2px solid transparent;
    font-size: 14px;
  }
  .nav-link:hover { color: var(--text); background: rgba(255,255,255,.02); }
  .nav-link.active {
    color: var(--accent-2); border-left-color: var(--accent-2);
    background: rgba(139,124,255,.08);
  }
  .nav-link .ico { width: 16px; display: inline-block; text-align: center; opacity: .8; font-size: 13px; }

  /* ---------- Main area ---------- */
  .main {
    overflow-y: auto; display: flex; flex-direction: column;
  }
  .page-header {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 28px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg); z-index: 5;
  }
  .page-header h1 { margin: 0; font-size: 18px; font-weight: 600; }
  .page-header .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .page-body { padding: 20px 28px 60px; }

  /* ---------- Buttons / inputs ---------- */
  .btn {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border-2); padding: 7px 14px;
    border-radius: 7px; cursor: pointer; font-size: 13px;
  }
  .btn:hover { background: #1c2030; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: #7867e8; }
  .btn.danger { color: var(--err); border-color: rgba(255,107,107,.3); }
  .btn.ghost { background: transparent; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.sm { padding: 4px 10px; font-size: 12px; }
  input, textarea, select {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border-2); padding: 8px 10px;
    border-radius: 7px; font: inherit; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; font-family: inherit; }
  .muted { color: var(--muted); }
  .pill { padding: 2px 8px; border-radius: 4px; font-size: 11px; }
  .pill.live { background: rgba(61,220,151,.12); color: var(--ok); }
  .pill.stopped { background: rgba(139,147,167,.12); color: var(--muted); }
  .pill.success { background: rgba(61,220,151,.12); color: var(--ok); }
  .pill.fail { background: rgba(255,107,107,.12); color: var(--err); }
  .pill.active { background: rgba(74,163,255,.12); color: var(--blue); }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .dot.ok { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.err { background: var(--err); }

  /* ---------- Mission Control kanban ---------- */
  .kanban-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .kanban-counts { color: var(--muted); font-size: 13px; margin-right: auto; }
  .kanban {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px; align-items: start;
  }
  .kanban-col {
    background: var(--panel); border-radius: 10px;
    border: 1px solid var(--border); padding: 12px; min-height: 200px;
  }
  .kanban-col-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
    padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .kanban-col-header .agent-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff;
  }
  .kanban-col-header .col-name { font-weight: 600; flex: 1; }
  .kanban-col-header .col-count { color: var(--muted); font-size: 12px; }
  .kanban-col-header .live-dot { color: var(--ok); font-size: 10px; }
  .kanban-card {
    background: var(--panel-2); border-radius: 8px;
    border: 1px solid var(--border-2); padding: 10px;
    margin-bottom: 8px; cursor: grab;
  }
  .kanban-card:active { cursor: grabbing; }
  .kanban-card-ghost { opacity: 0.4; background: var(--accent); }
  .kanban-cards { min-height: 40px; }
  .kanban-card[data-status="live"] { border-color: var(--blue); box-shadow: 0 0 0 1px rgba(74,163,255,.3); }
  .kanban-card[data-status="done"] { border-color: rgba(61,220,151,.4); }
  .kanban-card[data-status="failed"] { border-color: rgba(255,107,107,.4); }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  .kanban-card .meta { color: var(--muted); font-size: 11px; margin-bottom: 4px; display: flex; gap: 8px; }
  .kanban-card .title { font-size: 13px; margin-bottom: 8px; }
  .kanban-card .row {
    display: flex; gap: 6px; align-items: center;
  }
  .kanban-card select { flex: 1; padding: 4px 8px; font-size: 11px; }
  .kanban-empty { color: var(--muted-2); font-size: 12px; padding: 12px 4px; text-align: center; }

  /* ---------- Agents grid ---------- */
  .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
  .agent-card {
    background: var(--panel); border-radius: 10px; border: 1px solid var(--border); padding: 14px;
    transition: border-color .15s;
  }
  .agent-card:hover { border-color: var(--border-2); }
  .agent-card .head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .agent-card .ava {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #fff;
  }
  .agent-card .name { font-weight: 600; }
  .agent-card .name small { color: var(--muted); margin-left: 6px; font-weight: 400; font-size: 11px; }
  .agent-card .desc { color: var(--muted); font-size: 12px; min-height: 32px; margin-bottom: 12px; }
  .agent-card .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .agent-card select.model { padding: 4px 8px; font-size: 12px; }
  .agent-card .turns { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; margin-top: 8px; }
  .agent-card .turns-n { font-size: 18px; font-weight: 600; }
  .agent-card .actions { display: flex; gap: 6px; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  .agent-card .actions .icon-btn {
    background: transparent; border: 1px solid var(--border-2); color: var(--muted);
    width: 28px; height: 28px; border-radius: 6px; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .agent-card .actions .icon-btn:hover { color: var(--text); border-color: var(--accent); }

  /* Avatar palette per agent */
  .ava-main    { background: linear-gradient(135deg, #4aa3ff, #6c5ce7); }
  .ava-meta    { background: linear-gradient(135deg, #6366f1, #2563eb); }
  .ava-comms   { background: linear-gradient(135deg, #ec4899, #db2777); }
  .ava-content { background: linear-gradient(135deg, #f59e0b, #d97706); }
  .ava-ops     { background: linear-gradient(135deg, #10b981, #059669); }
  .ava-research{ background: linear-gradient(135deg, #8b5cf6, #6d28d9); }

  /* ---------- Scheduled list + editor ---------- */
  .sched-list { background: var(--panel); border-radius: 10px; border: 1px solid var(--border); }
  .sched-row {
    display: grid; grid-template-columns: 28px 1fr 220px 90px 90px 60px;
    gap: 14px; align-items: center; padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .sched-row:first-child { border-top: 0; }
  .sched-row .name { font-weight: 600; }
  .sched-row .preview { color: var(--muted); font-size: 12px; margin-top: 2px; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sched-row .when { color: var(--muted); font-size: 12px; }
  .sched-row .agent-tag { color: var(--accent-2); font-size: 12px; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(2px);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--panel); border-radius: 12px; border: 1px solid var(--border-2);
    width: 600px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .modal-head { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .modal-head h2 { margin: 0; font-size: 16px; flex: 1; }
  .modal-head .x { background: transparent; border: 0; color: var(--muted); font-size: 18px; cursor: pointer; }
  .modal-body { padding: 18px 22px; }
  .modal-foot { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .field { margin-bottom: 14px; }
  .field label { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .field input, .field textarea, .field select { width: 100%; }
  .seg { display: inline-flex; background: var(--panel-2); border: 1px solid var(--border-2); border-radius: 7px; overflow: hidden; }
  .seg button { background: transparent; color: var(--muted); border: 0; padding: 7px 14px; cursor: pointer; font-size: 12px; }
  .seg button.on { background: var(--accent); color: #fff; }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    padding: 5px 10px; border-radius: 6px; background: var(--panel-2);
    border: 1px solid var(--border-2); font-size: 12px; cursor: pointer;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .time-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px; background: var(--panel-2); border: 1px solid var(--border-2);
    border-radius: 6px; font-size: 12px; font-family: ui-monospace, monospace;
  }
  .time-chip .x { background: transparent; border: 0; color: var(--muted); cursor: pointer; padding: 0; font-size: 14px; }

  /* ---------- Hive Mind ---------- */
  .hive-tabs { display: flex; gap: 6px; padding: 0 28px; border-bottom: 1px solid var(--border); }
  .hive-tab {
    padding: 10px 14px; color: var(--muted); cursor: pointer; font-size: 13px;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .hive-tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .hive-list { background: var(--panel); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
  .hive-list-row {
    display: grid; grid-template-columns: 110px 110px 160px 1fr;
    gap: 14px; align-items: center; padding: 12px 16px;
    border-top: 1px solid var(--border);
    color: var(--text); font-size: 13px;
  }
  .hive-list-row:first-child { border-top: 0; background: var(--panel-2); color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; padding: 8px 16px; }
  .hive-list-row .col-when { color: var(--muted); }
  .hive-list-row .col-summary { color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-tag-pill { font-size: 12px; }
  .agent-tag-pill .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .agent-tag-pill[data-agent="main"] .dot     { background: var(--blue); }
  .agent-tag-pill[data-agent="meta"] .dot     { background: var(--accent); }
  .agent-tag-pill[data-agent="comms"] .dot    { background: var(--pink); }
  .agent-tag-pill[data-agent="content"] .dot  { background: var(--orange); }
  .agent-tag-pill[data-agent="ops"] .dot      { background: var(--green); }
  .agent-tag-pill[data-agent="research"] .dot { background: var(--accent-2); }
  #hive-graph { background: var(--panel); border-radius: 10px; border: 1px solid var(--border); height: 480px; }
  .brain-3d-placeholder { background: var(--panel); border-radius: 10px; border: 1px solid var(--border); height: 480px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); text-align: center; padding: 24px; }
  .brain-3d-placeholder .icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }

  /* ---------- Memories ---------- */
  .mem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .panel { background: var(--panel); border-radius: 10px; border: 1px solid var(--border); padding: 14px; }
  .panel h3 { margin: 0 0 12px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .dist-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .dist-label { width: 64px; color: var(--muted); font-size: 11px; font-family: ui-monospace, monospace; }
  .dist-bar { flex: 1; background: var(--panel-2); border-radius: 3px; height: 14px; overflow: hidden; }
  .dist-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .3s; }
  .dist-count { width: 36px; text-align: right; color: var(--muted); font-size: 11px; }
  .pin-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .pin-item:last-child { border: 0; }
  .pin-scope { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--panel-2); color: var(--accent-2); white-space: nowrap; }
  .pin-content { flex: 1; font-size: 12px; }
  .pin-del { background: transparent; border: 0; color: var(--err); cursor: pointer; opacity: .5; }
  .pin-del:hover { opacity: 1; }
  .insight-card { background: var(--panel); padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border); border-left: 3px solid var(--ok); margin-bottom: 8px; }
  .insight-conf { font-size: 11px; color: var(--muted); margin-bottom: 4px; }

  /* ---------- Chat ---------- */
  .chat-filter { display: flex; gap: 6px; padding: 0 28px 14px; flex-wrap: wrap; }
  .chat-feed { background: var(--panel); border-radius: 10px; border: 1px solid var(--border); padding: 14px; max-width: 900px; }
  .chat-msg { padding: 10px 0; border-top: 1px solid var(--border); }
  .chat-msg:first-child { border: 0; }
  .chat-head { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .chat-prompt { color: var(--muted); font-size: 12px; }
  .chat-reply { font-size: 13px; white-space: pre-wrap; word-wrap: break-word; margin-top: 4px; }

  /* ---------- Audit / Usage ---------- */
  .audit-row { display: grid; grid-template-columns: 100px 90px 200px 1fr; gap: 14px; align-items: center; padding: 8px 16px; border-top: 1px solid var(--border); font-size: 12px; }
  .audit-row:first-child { border: 0; background: var(--panel-2); color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; padding: 8px 16px; }
  .audit-row .corr { font-family: ui-monospace, monospace; color: var(--muted-2); font-size: 11px; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--panel); border-left: 3px solid var(--ok);
    padding: 12px 18px; border-radius: 7px;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
    opacity: 0; transition: opacity .2s; pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; }
  .toast.err { border-left-color: var(--err); }

  .empty { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }
  .badge { background: var(--accent); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }

  /* tiny utility */
  .row { display: flex; gap: 8px; align-items: center; }
  .grow { flex: 1; }
  .gap-12 { gap: 12px; }
  .mt-12 { margin-top: 12px; }

  /* ============================================================== */
  /* C4 — Mobile-responsive (≤ 768px)                                 */
  /* ============================================================== */
  @media (max-width: 768px) {
    /* App shell: stack vertically. Sidebar collapses to bottom-tab nav. */
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 60px;
    }
    .sidebar {
      order: 2;
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      border-right: 0;
      border-top: 1px solid var(--border);
      padding: 6px 4px;
      gap: 2px;
    }
    .ws-switcher, .search-box, .nav-section .label { display: none; }
    .nav-section { margin: 0; display: contents; }
    .nav-link {
      flex: 0 0 auto;
      padding: 8px 12px;
      flex-direction: column;
      gap: 2px;
      font-size: 10px;
      border-left: 0;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      text-align: center;
    }
    .nav-link.active {
      border-left: 0;
      border-bottom-color: var(--accent-2);
    }
    .nav-link .ico { font-size: 16px; }

    .main { order: 1; }
    .page-header {
      padding: 12px 14px;
      flex-wrap: wrap;
    }
    .page-header h1 { font-size: 15px; }
    .page-header .header-actions {
      width: 100%;
      flex-wrap: wrap;
      gap: 6px;
    }
    .page-body { padding: 12px 14px 80px; }

    /* Mission Control: stack columns. */
    .kanban {
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .kanban-toolbar { flex-wrap: wrap; }
    .kanban-counts { width: 100%; order: -1; margin-bottom: 4px; }

    /* Agents: single column. */
    .agents-grid { grid-template-columns: 1fr; }

    /* Modals: full-bleed bottom sheet. */
    .modal {
      width: 100vw; max-width: 100vw;
      max-height: 92vh;
      border-radius: 14px 14px 0 0;
      align-self: end;
    }

    /* Memory landscape: stack. */
    .mem-grid { grid-template-columns: 1fr; }

    /* Hive list: hide ACTION column, condense WHEN. */
    .hive-list-row {
      grid-template-columns: 80px 90px 1fr;
      gap: 8px;
      padding: 10px 12px;
    }
    .hive-list-row > div:nth-child(3) { display: none; } /* drop ACTION on mobile */

    /* Scheduled: stack rows. */
    .sched-row {
      grid-template-columns: 1fr;
      gap: 6px;
      padding: 12px;
    }

    /* Audit: drop correlation column. */
    .audit-row { grid-template-columns: 80px 70px 1fr; gap: 8px; padding: 8px 12px; }
    .audit-row > div:nth-child(4) { display: none; }

    /* Tighter input padding. */
    input, textarea, select { padding: 10px; font-size: 16px; } /* 16px stops iOS auto-zoom */
  }

  @media (max-width: 480px) {
    .nav-link { padding: 6px 8px; font-size: 9px; }
    .agent-card .actions .icon-btn { width: 32px; height: 32px; }
    .btn { padding: 8px 14px; }
    .btn.sm { padding: 6px 10px; }
  }
</style>
</head>
<body>
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/sortablejs@1.15.2/Sortable.min.js"></script>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>

<div class="app">
  <!-- ============== SIDEBAR ============== -->
  <aside class="sidebar">
    <div class="ws-switcher">
      <div class="ws-icon"></div>
      <div class="ws-name">Mark's Lab</div>
      <span class="ws-chev">▾</span>
    </div>
    <div class="search-box">
      <span>🔍</span>

      <div class="nav-link" style="cursor:default" id="svc-bridge"><span class="ico">●</span> Bridge :3142 <span style="margin-left:auto;font-size:10px" id="svc-bridge-state">…</span></div>
      <div class="nav-link" style="cursor:default" id="svc-warroom"><span class="ico">●</span> War Room :7860 <span style="margin-left:auto;font-size:10px" id="svc-warroom-state">…</span></div>
      <div class="nav-link" style="cursor:default" id="svc-meeting"><span class="ico">●</span> Meetings :7861 <span style="margin-left:auto;font-size:10px" id="svc-meeting-state">…</span></div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================================
// Tiny SPA framework — hash routing + page registry.
// ============================================================================
const $ = (sel, ctx=document) => ctx.querySelector(sel);
const $$ = (sel, ctx=document) => [...ctx.querySelectorAll(sel)];
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ago = ts => {
  const d = Math.floor(Date.now()/1000) - ts;
  if (d < 60) return d + 's ago';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  if (d < 86400*7) return Math.floor(d/86400) + 'd ago';
  if (d < 86400*30) return Math.floor(d/(86400*7)) + 'w ago';
  return Math.floor(d/(86400*30)) + 'mo ago';
};
function toast(msg, kind) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show' + (kind === 'err' ? ' err' : '');
  setTimeout(() => t.className = 'toast' + (kind === 'err' ? ' err' : ''), 2500);
}
async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`${path} ${r.status}`);
  return r.json();
}
function openModal(html) {
  $('#modal').innerHTML = html;
  $('#modal-bg').classList.add('open');
}
function closeModal() { $('#modal-bg').classList.remove('open'); }

const AGENTS = ['main', 'meta', 'comms', 'content', 'ops', 'research'];
const AGENT_DESCS = {
  main: 'Triage and delegation. Routes 9/10 requests.',
  meta: 'Helps break down performance for Meta ads.',
  comms: 'All textual communication — email, Slack, Telegram.',
  content: 'YouTube scripts, LinkedIn posts, carousels, content calendar.',
  ops: 'Calendar, scheduling, billing, Stripe, admin, task management.',
  research: 'Deep web research, academic sources, competitive intel, trend analysis.',
};

// ----- Router -----
const routes = {
  mission: renderMission,
  scheduled: renderScheduled,
  agents: renderAgents,
  chat: renderChat,
  memories: renderMemories,
  hive: renderHive,
  usage: renderUsage,
  audit: renderAudit,
  warroom: renderWarRoom,
  settings: renderSettings,
};
function navigate() {
  const r = (location.hash.slice(1) || 'mission');
  // Tear down 3D scene when leaving hive page.
  if (r !== 'hive' && _hive3d?.dispose) { _hive3d.dispose(); _hive3d = null; }
  $$('.nav-link').forEach(el => el.classList.toggle('active', el.dataset.route === r));
  const fn = routes[r] || routes.mission;
  fn();
}
window.addEventListener('hashchange', navigate);
$$('.nav-link').forEach(el => {
  el.addEventListener('click', () => location.hash = '#' + el.dataset.route);
});

// ============================================================================
// PAGE: Mission Control (kanban — V3 transcript ch.7)
// ============================================================================
async function renderMission() {
  const layout = localStorage.getItem('cc_mc_layout') || 'kanban';
  $('#main').innerHTML = `
    <div class="page-header">
      <h1>Mark's Lab · Tasks</h1>
      <div class="kanban-counts" id="km-counts">…</div>
      <div class="header-actions">
        <div class="seg" style="margin-right:8px">
          <button class="${layout==='kanban'?'on':''}" onclick="setLayout('kanban')">⊞ Kanban</button>
          <button class="${layout==='table'?'on':''}" onclick="setLayout('table')">≡ Table</button>
        </div>
        <button class="btn ghost"><span>⟲</span> History</button>
        <button class="btn ghost" onclick="autoAssignAll()">✦ Auto-assign all</button>
        <button class="btn primary" onclick="newTaskModal()">+ New Task</button>
      </div>
    </div>
    <div class="page-body">
      <div id="mc-content">Loading…</div>
    </div>
  `;
  await refreshKanban();
}
function setLayout(l) {
  localStorage.setItem('cc_mc_layout', l);
  renderMission();
}

async function refreshKanban() {
  try {
    const [{ rows }, { agents }] = await Promise.all([
      api('/api/tasks'),
      api('/api/agents'),
    ]);
    const showDone = localStorage.getItem('cc_show_done') === '1';
    const cols = ['inbox', ...agents.map(a => a.name)];
    const byCol = Object.fromEntries(cols.map(c => [c, []]));
    let live = 0, unassigned = 0, done = 0, failed = 0;
    for (const t of rows) {
      if (t.status === 'done') { done++; if (!showDone) continue; }
      if (t.status === 'failed') { failed++; }
      if (t.agent && byCol[t.agent]) byCol[t.agent].push(t);
      else { byCol.inbox.push(t); unassigned++; }
      if (t.status === 'live') live++;
    }
    // Sort each column: live → queued → failed → done.
    const order = { live: 0, queued: 1, failed: 2, done: 3 };
    for (const c of cols) byCol[c].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));
    $('#km-counts').innerHTML =
      `${live} active · ${unassigned} unassigned · ${done} done · ${failed} failed · ${rows.length} total
       <label style="margin-left:12px;font-size:11px;cursor:pointer">
         <input type="checkbox" ${showDone?'checked':''} onchange="toggleShowDone(this.checked)" />
         show done
       </label>`;
    const layout = localStorage.getItem('cc_mc_layout') || 'kanban';
    if (layout === 'table') {
      renderMissionTable(rows, showDone);
      return;
    }
    const renderHtml = cols.map(col => {
      const isInbox = col === 'inbox';
      const tasks = byCol[col];
      return `
        <div class="kanban-col" data-col="${col}">
          <div class="kanban-col-header">
            ${isInbox
              ? '<div class="ava ava-main" style="width:24px;height:24px;font-size:10px">📥</div>'
              : `<div class="agent-avatar ava-${col}">${col[0].toUpperCase()}</div>`}
            <div class="col-name">${isInbox ? 'Inbox' : col[0].toUpperCase()+col.slice(1)}</div>
            <div class="col-count">${tasks.length}</div>
            ${!isInbox ? `<div class="live-dot">●</div>` : ''}
          </div>
          <div class="kanban-cards" data-col="${col}">
          ${tasks.length ? tasks.map(t => renderTaskCard(t)).join('') : '<div class="kanban-empty">Drop tasks here</div>'}
          </div>
        </div>
      `;
    }).join('');
    // Wrap the rendered cols in #kanban container (id is now #mc-content).
    $('#mc-content').innerHTML = `<div class="kanban" id="kanban">${renderHtml}</div>`;
    // A4 — wire Sortable on each column.
    if (typeof Sortable !== 'undefined') {
      $$('.kanban-cards').forEach(el => {
        Sortable.create(el, {
          group: 'tasks',
          animation: 150,
          ghostClass: 'kanban-card-ghost',
          onAdd: async (evt) => {
            const id = Number(evt.item.dataset.id);
            const targetCol = evt.to.dataset.col;
            const agent = targetCol === 'inbox' ? null : targetCol;
            try {
              if (agent) {
                await api(`/api/tasks/${id}/assign`, {
                  method: 'POST', headers: { 'content-type': 'application/json' },
                  body: JSON.stringify({ agent }),
                });
                toast(`#${id} → ${agent}`);
              } else {
                // Moving to inbox = unassign — backend doesn't support null,
                // so just refresh and let user reassign.
                toast('inbox = unassigned (use a column to set agent)');
              }
              refreshKanban();
            } catch (e) {
              toast('move failed: ' + e.message, 'err');
              refreshKanban();
            }
          },
        });
      });
    }
  } catch (e) {
    $('#mc-content').innerHTML = `<div class="empty">Error: ${esc(e.message)}</div>`;
  }
}

async function showResultModal(id) {
  try {
    const t = await api(`/api/tasks/${id}`);
    openModal(`
      <div class="modal-head">
        <h2>#${id} · ${esc(t.title)}</h2>
        <button class="x" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="row" style="margin-bottom:10px;font-size:11px;color:var(--muted)">
          <span>agent: ${esc(t.agent || '—')}</span>
          <span>status: ${esc(t.status)}</span>
          <span>${t.tokens || 0} tokens · $${(+t.cost_usd||0).toFixed(4)}</span>
          ${t.started_at && t.finished_at ? `<span>${t.finished_at - t.started_at}s</span>` : ''}
        </div>
        ${t.error ? `<div class="field"><label>Error</label><pre style="margin:0;padding:10px;background:#0b0c10;border-radius:6px;color:var(--err);white-space:pre-wrap;font-size:12px;max-height:60vh;overflow:auto">${esc(t.error)}</pre></div>` : ''}
        ${t.result ? `<div class="field"><label>Result</label><pre style="margin:0;padding:10px;background:#0b0c10;border-radius:6px;white-space:pre-wrap;font-size:12px;max-height:60vh;overflow:auto;line-height:1.5">${esc(t.result)}</pre></div>` : ''}
      </div>
      <div class="modal-foot">
        <button class="btn ghost" onclick="closeModal()">Close</button>
        ${t.status === 'done' || t.status === 'failed' ? `<button class="btn" onclick="closeModal(); retryTask(${id})">↻ Retry</button>` : ''}
      </div>
    `);
  } catch (e) { toast(e.message, 'err'); }
}

function renderMissionTable(rows, showDone) {
  const filtered = showDone ? rows : rows.filter(r => r.status !== 'done');
  const order = { live: 0, queued: 1, failed: 2, done: 3 };
  filtered.sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9) || b.id - a.id);
  $('#mc-content').innerHTML = `
    <div class="hive-list" style="overflow:auto">
      <div class="audit-row" style="grid-template-columns:50px 1fr 100px 90px 110px 130px">
        <div>ID</div><div>TITLE</div><div>AGENT</div><div>STATUS</div><div>TOKENS / COST</div><div>ACTIONS</div>
      </div>
      ${filtered.map(t => `
        <div class="audit-row" style="grid-template-columns:50px 1fr 100px 90px 110px 130px">
          <div class="muted">#${t.id}</div>
          <div>
            <div style="font-weight:600">${esc(t.title)}</div>
            ${t.description ? `<div class="muted" style="font-size:11px">${esc(t.description.slice(0,80))}${t.description.length>80?'…':''}</div>` : ''}
          </div>
          <div><span class="agent-tag-pill" data-agent="${esc(t.agent||'main')}"><span class="dot"></span>${esc(t.agent || '—')}</span></div>
          <div><span class="pill ${t.status==='done'?'success':t.status==='live'?'active':t.status==='failed'?'fail':'stopped'}">${esc(t.status)}</span></div>
          <div class="muted">${t.tokens || 0}t · $${(+t.cost_usd||0).toFixed(4)}</div>
          <div class="row" style="gap:4px">
            ${t.status === 'queued' && t.agent ? `<button class="btn sm primary" onclick="runTask(${t.id})">▶</button>` : ''}
            ${t.status === 'done' || t.status === 'failed' ? `<button class="btn sm ghost" onclick="retryTask(${t.id})">↻</button>` : ''}
            ${t.result ? `<button class="btn sm ghost" onclick="showResultModal(${t.id})">👁</button>` : ''}
            <button class="btn sm ghost danger" onclick="deleteTaskHard(${t.id})">🗑</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderTaskCard(t) {
  const statusColor = t.status === 'live' ? 'var(--blue)' :
                      t.status === 'done' ? 'var(--ok)' :
                      t.status === 'failed' ? 'var(--err)' : 'var(--muted)';
  const spinner = t.status === 'live'
    ? '<span class="spin">◐</span>'
    : t.status === 'done' ? '✓'
    : t.status === 'failed' ? '✗' : '';
  const result = (t.result || '').trim();
  const error = (t.error || '').trim();
  return `
    <div class="kanban-card" data-id="${t.id}" data-status="${esc(t.status)}">
      <div class="meta">
        <span>${esc(t.agent || 'unassigned')}</span>
        <span style="margin-left:auto;color:${statusColor}">${spinner} ${esc(t.status)}</span>
      </div>
      <div class="title">${esc(t.title)}</div>
      ${t.description ? `<div class="muted" style="font-size:11px;margin-top:4px">${esc(t.description.slice(0,160))}${t.description.length>160?'…':''}</div>` : ''}
      ${result ? `<details style="margin-top:6px"><summary style="cursor:pointer;color:var(--ok);font-size:11px">✓ Result · ${(+t.cost_usd||0).toFixed(4)}$</summary><pre style="margin:6px 0 0;padding:8px;background:#0b0c10;border-radius:6px;font-size:11px;white-space:pre-wrap;max-height:240px;overflow:auto">${esc(result)}</pre></details>` : ''}
      ${error ? `<details style="margin-top:6px"><summary style="cursor:pointer;color:var(--err);font-size:11px">✗ Error</summary><pre style="margin:6px 0 0;padding:8px;background:#0b0c10;border-radius:6px;font-size:11px;color:var(--err);white-space:pre-wrap">${esc(error)}</pre></details>` : ''}
      <div class="row" style="margin-top:6px">
        ${!t.agent ? `<button class="btn sm ghost" onclick="autoAssign(${t.id})">✦ Auto</button>` : ''}
        <select onchange="manualAssign(${t.id}, this.value)" ${t.status === 'live' ? 'disabled' : ''}>
          <option value="">${t.agent ? 'Reassign…' : 'Assign to…'}</option>
          ${AGENTS.map(a => `<option value="${a}" ${t.agent===a?'selected':''}>${a}</option>`).join('')}
        </select>
        <button class="btn sm ghost danger" onclick="deleteTaskHard(${t.id})" title="Delete">🗑</button>
      </div>
      <div class="row" style="margin-top:6px">
        ${t.status === 'queued' && t.agent ? `<button class="btn sm primary" onclick="runTask(${t.id})">▶ Run</button>` : ''}
        ${t.status === 'live' ? `<button class="btn sm" disabled>⏳ Running…</button>` : ''}
        ${t.status === 'done' ? `<button class="btn sm ghost" onclick="retryTask(${t.id})">↻ Retry</button>` : ''}
        ${t.status === 'failed' ? `<button class="btn sm" onclick="retryTask(${t.id})">↻ Retry</button>` : ''}
      </div>
    </div>
  `;
}
async function autoAssign(id) {
  try {
    const r = await api(`/api/tasks/${id}/auto-assign`, { method: 'POST' });
    toast(`#${id} → ${r.agent ?? r.error}`, r.error ? 'err' : 'ok');
    refreshKanban();
  } catch (e) { toast('auto-assign failed: ' + e.message, 'err'); }
}
async function runTask(id) {
  try {
    const r = await api(`/api/tasks/${id}/run`, { method: 'POST' });
    if (r.ok) {
      toast(`▶ #${id} dispatched to bridge`);
    } else {
      toast(`run failed: ${r.reason || 'unknown'}`, 'err');
    }
    refreshKanban();
  } catch (e) { toast('run failed: ' + e.message, 'err'); }
}
async function retryTask(id) {
  try {
    await api(`/api/tasks/${id}/retry`, { method: 'POST' });
    await runTask(id);
  } catch (e) { toast('retry failed: ' + e.message, 'err'); }
}
function toggleShowDone(checked) {
  localStorage.setItem('cc_show_done', checked ? '1' : '0');
  refreshKanban();
}
async function deleteTaskHard(id) {
  if (!confirm('Delete this task permanently?')) return;
  try {
    await api(`/api/tasks/${id}`, { method: 'DELETE' });
    toast(`#${id} deleted`);
    refreshKanban();
  } catch (e) { toast('delete failed: ' + e.message, 'err'); }
}
async function manualAssign(id, agent) {
  if (!agent) return;
  try {
    await api(`/api/tasks/${id}/assign`, {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ agent }),
    });
    toast(`#${id} → ${agent}`);
    refreshKanban();
  } catch (e) { toast('assign failed: ' + e.message, 'err'); }
}
async function setTaskStatus(id, status) {
  try {
    await api(`/api/tasks/${id}/status`, {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ status }),
    });
    refreshKanban();
  } catch (e) { toast(e.message, 'err'); }
}
async function deleteTask(id) {
  // No DELETE route yet; soft-delete via status='done'
  await setTaskStatus(id, 'done');
}
async function autoAssignAll() {
  const { rows } = await api('/api/tasks');
  const todo = rows.filter(t => !t.agent && t.status === 'queued');
  for (const t of todo) await autoAssign(t.id);
  toast(`auto-assigned ${todo.length}`);
}
function newTaskModal() {
  openModal(`
    <div class="modal-head">
      <h2>New task</h2>
      <button class="x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Title</label>
        <input id="nt-title" placeholder="What needs doing?" />
      </div>
      <div class="field">
        <label>Description (optional)</label>
        <textarea id="nt-desc" rows="3" placeholder="Context, links, deliverable…"></textarea>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="nt-pri">
          <option>low</option><option selected>medium</option><option>high</option>
        </select>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="createNewTask(false)">Create</button>
      <button class="btn primary" onclick="createNewTask(true)">Create + Auto-assign</button>
    </div>
  `);
  setTimeout(() => $('#nt-title')?.focus(), 50);
}
async function createNewTask(autoassign) {
  const title = $('#nt-title').value.trim();
  if (!title) return toast('title required', 'err');
  try {
    const r = await api('/api/tasks', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        title,
        description: $('#nt-desc').value,
        priority: $('#nt-pri').value,
      }),
    });
    if (autoassign) await autoAssign(r.id);
    closeModal();
    refreshKanban();
  } catch (e) { toast(e.message, 'err'); }
}

// ============================================================================
// PAGE: Scheduled (V3 transcript ch.10)
// ============================================================================
async function renderScheduled() {
  $('#main').innerHTML = `
    <div class="page-header">
      <h1>Scheduled</h1>
      <div class="header-actions">
        <span class="muted" id="sched-count">…</span>
        <button class="btn primary" onclick="schedEditModal()">+ New scheduled task</button>
      </div>
    </div>
    <div class="page-body">
      <div id="sched-yaml-section">
        <h3 class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin:0 0 8px">Code-managed (cron.yaml)</h3>
        <div class="sched-list" id="sched-yaml-list"><div class="empty">Loading…</div></div>
      </div>
      <h3 class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin:24px 0 8px">User-editable (database)</h3>
      <div class="sched-list" id="sched-db-list"><div class="empty">Loading…</div></div>
    </div>
  `;
  await Promise.all([refreshSchedYaml(), refreshSchedDb()]);
}
async function refreshSchedYaml() {
  try {
    const data = await api('/api/schedule');
    if (!data.missions || !data.missions.length) {
      $('#sched-yaml-list').innerHTML = '<div class="empty">No missions in cron.yaml.</div>';
      return;
    }
    $('#sched-yaml-list').innerHTML = data.missions.map(m => `
      <div class="sched-row">
        <div></div>
        <div>
          <div class="name">${esc(m.name)}</div>
          <div class="preview">${esc(m.prompt_preview)}${m.prompt_preview.length >= 200 ? '…' : ''}</div>
        </div>
        <div class="when">${esc(m.schedule_human)}</div>
        <div><span class="pill ${data.enabled ? 'live' : 'stopped'}">${data.enabled ? 'enabled' : 'disabled'}</span></div>
        <div><span class="agent-tag">@${esc(m.agent)}</span></div>
        <div></div>
      </div>
    `).join('');
  } catch (e) {
    $('#sched-yaml-list').innerHTML = `<div class="empty">Error: ${esc(e.message)}</div>`;
  }
}
async function refreshSchedDb() {
  try {
    const { rows } = await api('/api/scheduled');
    $('#sched-count').textContent = `${rows.length} user-editable`;
    if (!rows.length) {
      $('#sched-db-list').innerHTML = '<div class="empty">No scheduled tasks yet. Click + New to add one.</div>';
      return;
    }
    $('#sched-db-list').innerHTML = rows.map(r => `
      <div class="sched-row">
        <div></div>

let _schedDraft = null;
function schedEditModal(id) {

function _renderSchedModal() {

          <button class="${d.days_mode==='weekdays' ? 'on' : ''}" onclick="schedDays('weekdays')">Weekdays</button>
          <button class="${d.days_mode==='weekends' ? 'on' : ''}" onclick="schedDays('weekends')">Weekends</button>
          <button class="${d.days_mode==='custom' ? 'on' : ''}" onclick="schedDays('custom')">Custom</button>
        </div>

              <span class="chip ${d.custom_days.includes(i) ? 'on' : ''}" onclick="schedToggleDay(${i})">${n}</span>
            `).join('')}

        ` : ''}
      </div>
      <div class="muted" style="font-size:12px">${esc(cronToEnglishClient(buildCronFromDraft()))} <span style="float:right"><a href="#" onclick="event.preventDefault(); schedAdvanced()">⚐ Advanced (cron)</a></span></div>
      <div class="chip-row mt-12">
        ${[
          ['Daily 9am', '0 9 * * *'],
          ['Weekdays 8am', '0 8 * * 1-5'],
          ['Every Monday 9am', '0 9 * * 1'],
          ['Every Sunday 6pm', '0 18 * * 0'],
          ['Every 4 hours', '0 */4 * * *'],
        ].map(([n,c]) => `<span class="chip" onclick="schedPreset('${c}')">${n}</span>`).join('')}
      </div>
      <div class="field" style="margin-top:18px">

      <button class="btn primary" onclick="schedSave()" id="sd-save">Save changes</button>
    </div>
  `);
}
function schedDays(mode) { _schedDraft.days_mode = mode; _renderSchedModal(); }
function schedToggleDay(d) {
  const arr = _schedDraft.custom_days;
  const i = arr.indexOf(d);
  if (i >= 0) arr.splice(i, 1); else arr.push(d);
  _renderSchedModal();
}
function schedAddTime() {
  const v = $('#sd-newtime').value;
  if (!/^\d{2}:\d{2}$/.test(v)) return toast('use HH:MM', 'err');
  _schedDraft.times.push(v); _renderSchedModal();
}
function schedRemoveTime(i) { _schedDraft.times.splice(i,1); _renderSchedModal(); }
function schedPreset(cron) {
  Object.assign(_schedDraft, parseCron(cron));
  _schedDraft.schedule = cron;
  _renderSchedModal();
}
function schedAdvanced() {
  const cur = buildCronFromDraft();
  const v = prompt('Cron expression (5 fields):', cur);
  if (v && /^\S+\s+\S+\s+\S+\s+\S+\s+\S+$/.test(v)) {
    Object.assign(_schedDraft, parseCron(v));
    _renderSchedModal();
  }
}
function buildCronFromDraft() {
  const d = _schedDraft;
  // pick first time (cron supports multiple but we encode only first when DB-driven)
  const t = d.times[0] || '09:00';
  const [hh, mm] = t.split(':');
  const dow = d.days_mode === 'every' ? '*'
    : d.days_mode === 'weekdays' ? '1-5'
    : d.days_mode === 'weekends' ? '0,6'
    : (d.custom_days.length ? d.custom_days.sort().join(',') : '*');
  return `${parseInt(mm)} ${parseInt(hh)} * * ${dow}`;
}
function parseCron(expr) {
  const p = (expr||'').trim().split(/\s+/);
  if (p.length !== 5) return {};
  const [mn, hr, , , dow] = p;
  const time = (Number(hr).toString().padStart(2,'0')) + ':' + (Number(mn).toString().padStart(2,'0'));
  const days_mode = dow === '*' ? 'every' : dow === '1-5' ? 'weekdays' : (dow === '0,6'||dow==='6,0') ? 'weekends' : 'custom';
  const custom_days = days_mode === 'custom' ? dow.split(',').map(Number).filter(n=>n>=0&&n<=6) : [];
  return { times: [time], days_mode, custom_days, schedule: expr };
}
function cronToEnglishClient(expr) {
  const p = (expr||'').trim().split(/\s+/);
  if (p.length !== 5) return expr;
  const [mn,hr,,,dow] = p;
  const time = (Number(hr) % 12 || 12) + ':' + String(Number(mn)).padStart(2,'0') + ' ' + (Number(hr) < 12 ? 'AM' : 'PM');
  if (dow === '*') return 'Every day at ' + time;
  if (dow === '1-5') return 'Weekdays at ' + time;
  if (dow === '0,6' || dow === '6,0') return 'Weekends at ' + time;
  const names = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if (/^\d$/.test(dow)) return names[Number(dow)] + 's at ' + time;
  if (/^\d(,\d)+$/.test(dow)) return dow.split(',').map(d=>names[Number(d)]).join(', ') + ' at ' + time;
  return expr;
}
async function schedSave() {
  const d = _schedDraft;
  d.schedule = buildCronFromDraft();
  d.name = $('#sd-name').value.trim();
  d.prompt = $('#sd-prompt').value.trim();

      });
    }
    toast(d.id ? 'updated' : 'created');
    closeModal();
    refreshSchedDb();
  } catch (e) { toast(e.message, 'err'); }
}

// 3D Hive Mind brain — V3 transcript ch.1, ch.15 ("holy grail of the hive mind").
// Real three.js scene: 6 agent supernodes orbiting a central core, with task
// nodes orbiting each agent. Pulses when activity is recent.
let _hive3d = null;  // {scene, camera, renderer, raf, dispose}
function renderHive3D() {
  $('#hive-content').innerHTML = `<div id="hive-3d" style="height:520px;background:var(--panel);border-radius:10px;border:1px solid var(--border);position:relative;overflow:hidden">
    <div id="hive-3d-overlay" style="position:absolute;top:12px;left:14px;color:var(--muted);font-size:11px;pointer-events:none;font-family:ui-monospace,monospace"></div>
    <div id="hive-3d-tooltip" style="position:absolute;display:none;padding:6px 10px;background:rgba(11,12,16,.95);border:1px solid var(--border-2);border-radius:6px;color:var(--text);font-size:12px;pointer-events:none;max-width:280px;z-index:10"></div>
  </div>`;
  if (typeof THREE === 'undefined') {
    $('#hive-3d').innerHTML = '<div class="empty">three.js failed to load. Falling back to 2D.</div>';
    setTimeout(() => hiveTab('2d'), 1200);
    return;
  }
  start3DBrain();
}

const AGENT_COLORS = {
  main:     0x8b7cff,
  meta:     0x6366f1,
  comms:    0xec4899,
  content:  0xf59e0b,
  ops:      0x10b981,
  research: 0x8b5cf6,
  sales:    0x06b6d4,
};

async function start3DBrain() {
  // Tear down any prior instance.
  if (_hive3d?.dispose) _hive3d.dispose();

  const data = await api(`/api/hive?period=${_hivePeriod}`);
  const container = $('#hive-3d');
  const overlay = $('#hive-3d-overlay');
  const tooltip = $('#hive-3d-tooltip');

  const W = container.clientWidth;
  const H = container.clientHeight;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0b10);
  scene.fog = new THREE.Fog(0x0a0b10, 50, 220);

  const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 500);
  camera.position.set(0, 30, 90);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  // Ambient + directional light
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dir = new THREE.DirectionalLight(0xffffff, 0.9);
  dir.position.set(20, 40, 30);
  scene.add(dir);

  // Central "core" — pulses with overall activity.
  const core = new THREE.Mesh(
    new THREE.IcosahedronGeometry(4, 1),
    new THREE.MeshStandardMaterial({ color: 0xb388ff, emissive: 0x6c4cff, emissiveIntensity: 0.7, roughness: 0.4, metalness: 0.6 }),
  );
  scene.add(core);

  // Group nodes by agent
  const byAgent = {};
  for (const n of data.nodes) {
    if (n.data.type !== 'task') continue;
    (byAgent[n.data.agent] ??= []).push(n.data);
  }
  const agentNames = Object.keys(byAgent).filter(a => AGENT_COLORS[a]);
  if (!agentNames.length) {
    // Fallback — show empty brain.
    agentNames.push(...Object.keys(AGENT_COLORS));
    agentNames.forEach(a => byAgent[a] = []);
  }

  const agentMeshes = [];
  const taskMeshes = [];
  const allInteractive = []; // for raycasting
  const orbitRadius = 32;

  agentNames.forEach((name, i) => {
    const angle = (i / agentNames.length) * Math.PI * 2;
    const x = Math.cos(angle) * orbitRadius;
    const z = Math.sin(angle) * orbitRadius;
    const color = AGENT_COLORS[name] || 0x888888;

    // Agent supernode
    const agentMesh = new THREE.Mesh(
      new THREE.SphereGeometry(2.2, 24, 16),
      new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.35, roughness: 0.3, metalness: 0.5 }),
    );
    agentMesh.position.set(x, 0, z);
    agentMesh.userData = { type: 'agent', name, count: byAgent[name].length };
    scene.add(agentMesh);
    agentMeshes.push(agentMesh);
    allInteractive.push(agentMesh);

    // Faint orbit ring
    const ringGeo = new THREE.RingGeometry(orbitRadius - 0.1, orbitRadius + 0.1, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x1d2030, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    if (i === 0) scene.add(ring);

    // Connecting line agent → core
    const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), agentMesh.position]);
    const lineMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.3 });
    scene.add(new THREE.Line(lineGeo, lineMat));

    // Task nodes orbiting this agent
    byAgent[name].forEach((task, ti) => {
      const taskAngle = (ti / Math.max(1, byAgent[name].length)) * Math.PI * 2;
      const r = 6 + (ti % 3) * 1.5; // multi-layer cluster
      const tx = x + Math.cos(taskAngle) * r;
      const tz = z + Math.sin(taskAngle) * r;
      const ty = (Math.sin(ti * 0.7) - 0.5) * 4;
      const taskMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.55, 12, 8),
        new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.4, roughness: 0.6 }),
      );
      taskMesh.position.set(tx, ty, tz);
      taskMesh.userData = {
        type: 'task',
        agent: name,
        id: task.id,
        label: task.fullPrompt || task.label || `task ${task.id}`,
        createdAt: task.createdAt,
      };
      taskMesh.userData.parentAngle = taskAngle;
      taskMesh.userData.parentR = r;
      taskMesh.userData.parentX = x;
      taskMesh.userData.parentZ = z;
      taskMesh.userData.taskY = ty;
      scene.add(taskMesh);
      taskMeshes.push(taskMesh);
      allInteractive.push(taskMesh);
    });
  });

  overlay.textContent = `🧠 Hive Mind · ${data.counts.agents} agents · ${data.counts.tasks} tasks · ${_hivePeriod}`;

  // Raycaster for hover tooltips
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  function onMove(ev) {
    const rect = container.getBoundingClientRect();
    mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(allInteractive);
    if (hits.length) {
      const o = hits[0].object.userData;
      const txt = o.type === 'agent'
        ? `<b>${o.name}</b> · ${o.count} tasks`
        : `<b>${o.agent}</b> · ${esc(o.label.slice(0, 100))}${o.label.length > 100 ? '…' : ''}`;
      tooltip.innerHTML = txt;
      tooltip.style.display = 'block';
      tooltip.style.left = (ev.clientX - rect.left + 12) + 'px';
      tooltip.style.top = (ev.clientY - rect.top + 12) + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  }
  container.addEventListener('mousemove', onMove);

  // Drag-to-orbit camera
  let dragging = false;
  let lastX = 0, lastY = 0;
  let camTheta = 0, camPhi = Math.PI / 4;
  let camDist = 95;
  function setCam() {
    camera.position.x = Math.sin(camTheta) * Math.cos(camPhi) * camDist;
    camera.position.y = Math.sin(camPhi) * camDist;
    camera.position.z = Math.cos(camTheta) * Math.cos(camPhi) * camDist;
    camera.lookAt(0, 0, 0);
  }
  setCam();
  container.addEventListener('mousedown', (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
  window.addEventListener('mouseup', () => { dragging = false; });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    camTheta -= (e.clientX - lastX) * 0.005;
    camPhi   = Math.max(0.1, Math.min(Math.PI - 0.1, camPhi - (e.clientY - lastY) * 0.005));
    lastX = e.clientX; lastY = e.clientY;
    setCam();
  });
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    camDist = Math.max(40, Math.min(200, camDist + e.deltaY * 0.05));
    setCam();
  }, { passive: false });

  // Animate
  let t = 0;
  let stopped = false;
  function loop() {
    if (stopped) return;
    t += 0.01;
    core.rotation.x = t * 0.3;
    core.rotation.y = t * 0.5;
    const pulse = 1 + 0.15 * Math.sin(t * 2);
    core.scale.set(pulse, pulse, pulse);

    agentMeshes.forEach((m, i) => {
      m.rotation.y = t * 0.5;
      const localPulse = 1 + 0.08 * Math.sin(t * 3 + i);
      m.scale.set(localPulse, localPulse, localPulse);
    });

    taskMeshes.forEach((m) => {
      const u = m.userData;
      u.parentAngle += 0.005;
      m.position.x = u.parentX + Math.cos(u.parentAngle) * u.parentR;
      m.position.z = u.parentZ + Math.sin(u.parentAngle) * u.parentR;
      m.position.y = u.taskY + Math.sin(t + u.parentAngle * 2) * 0.5;
    });

    renderer.render(scene, camera);
    _hive3d.raf = requestAnimationFrame(loop);
  }

  _hive3d = {
    scene, camera, renderer,
    raf: null,
    dispose: () => {
      stopped = true;
      cancelAnimationFrame(_hive3d.raf);
      container.removeEventListener('mousemove', onMove);
      container.contains(renderer.domElement) && container.removeChild(renderer.domElement);
      renderer.dispose();
      scene.traverse(o => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => m.dispose());
      });
    },
  };
  loop();
}

async function probeWarRoom() {

    await fetch('http://localhost:7860/healthz', { mode: 'no-cors', cache: 'no-store' });
    $('#wr-stat').innerHTML = '<span class="dot ok"></span>online';
    $('#wr-status-dot').innerHTML = '<span class="dot ok"></span>';
  } catch {
    $('#wr-stat').innerHTML = '<span class="dot err"></span>offline (start with <code>npm run warroom</code>)';
    $('#wr-status-dot').innerHTML = '';
  }
}

// ============================================================================
// PAGE: Settings
// ============================================================================
async function renderSettings() {
  $('#main').innerHTML = `
    <div class="page-header"><h1>Settings</h1></div>
    <div class="page-body">
      <div class="panel"><h3>Kill switches (V3 p4 + p5)</h3>
        <div id="kill-switches">Loading…</div>
      </div>
      <div class="panel mt-12"><h3>Build info</h3>
        <div class="muted" style="font-family:ui-monospace,monospace;font-size:11px">
          dashboard build · ClaudeClaw V3<br>
          See <code>docs/IMPLEMENTATION_STATUS.md</code> for full feature × build state.
        </div>
      </div>
    </div>
  `;
  refreshKillSwitches();
}
async function refreshKillSwitches() {
  try {
    const data = await api('/api/schedule');
    $('#kill-switches').innerHTML = `
      <div class="row" style="margin-bottom:8px">
        <label class="row" style="cursor:pointer">
          <input type="checkbox" ${data.enabled ? 'checked' : ''} onchange="toggleSchedSwitch(this.checked)" />
          <span>Scheduler enabled</span>
        </label>
        <span class="muted" style="font-size:11px;margin-left:auto">SCHEDULER_ENABLED env var</span>
      </div>
      <div class="muted" style="font-size:12px">Auto-assign and kill phrase are env-only (require process restart). See <code>.env</code>.</div>
    `;
  } catch (e) {
    $('#kill-switches').innerHTML = `<div class="empty">${esc(e.message)}</div>`;
  }
}
async function toggleSchedSwitch(enabled) {
  await api('/api/schedule/toggle', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ enabled }) });
  toast(enabled ? 'scheduler enabled' : 'scheduler halted');
  refreshKillSwitches();
}

// ============================================================================
// Boot
// ============================================================================
async function probeServices() {
  const probes = [
    { id: 'svc-bridge',  url: 'http://127.0.0.1:3142/' },
    { id: 'svc-warroom', url: 'http://localhost:7860/healthz' },
    { id: 'svc-meeting', url: 'http://localhost:7861/healthz' },
  ];
  for (const p of probes) {
    try {
      await fetch(p.url, { mode: 'no-cors', cache: 'no-store' });
      $('#' + p.id + '-state').textContent = 'online';
      $('#' + p.id + '-state').style.color = 'var(--ok)';
      $('#' + p.id + ' .ico').style.color = 'var(--ok)';
    } catch {
      $('#' + p.id + '-state').textContent = 'offline';
      $('#' + p.id + '-state').style.color = 'var(--muted)';
      $('#' + p.id + ' .ico').style.color = 'var(--err)';
    }
  }
}

navigate();
probeWarRoom();
probeServices();
setInterval(probeWarRoom, 12000);
setInterval(probeServices, 10000);
</script>
